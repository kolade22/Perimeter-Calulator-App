<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perimeter Calculator App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <h1>Perimeter Calculator</h1>
      <p class="tagline">Enter length and breadth to get the perimeter.</p>
      <label for="length">Length</label>
      <input type="number" id="length" placeholder="e.g. 12" />
      <label for="breadth">Breadth</label>
      <input type="number" id="breadth" placeholder="e.g. 8" />
      <button type="button" onclick="calculatePerimeter()">Calculate</button>
      <div id="output-box"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
